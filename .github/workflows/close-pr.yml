name: Close External Pull Requests

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  close-external-pr:
    if: github.event.pull_request.user.login != github.repository_owner
    runs-on: ubuntu-latest

    steps:
      - name: Explain policy and close pull request
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const message = [
              "Obrigado pelo interesse no LeadRadar.",
              "",
              "No momento, este repositório não aceita Pull Requests externos para preservar a visão autoral e manter a manutenção centralizada.",
              "",
              "Se você encontrou um bug, quer tirar uma dúvida ou sugerir uma melhoria, use a aba Issues.",
              "",
              "Este Pull Request será fechado automaticamente conforme a política pública do repositório."
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body: message,
            });

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number,
              state: "closed",
            });